<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ProbLab – Distribuciones de Probabilidad</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

</head>
<body>

<header>
    <h1>ProbLab</h1>
    <p>Visualizador interactivo de distribuciones de probabilidad</p>
</header>

<section class="card">

    <div class="form-group">
        <label>Distribución</label>
        <select id="distribution">
            <option value="normal">Normal</option>
            <option value="binomial">Binomial</option>
            <option value="poisson">Poisson</option>
            <option value="studentt">t de Student</option>
            <option value="chisquare">Chi-cuadrada</option>
            <option value="centralf">F de Snedecor</option>
            <option value="exponential">Exponencial</option>
            <option value="negbin">Binomial negativa</option>
            <option value="geometric">Geométrica</option>
        </select>
    </div>

    <div id="parameters"></div>

    <div class="form-group">
        <label>Tipo de cálculo</label>
        <select id="calculation">
            <option value="pdf">Función de densidad / probabilidad</option>
            <option value="cdf">Probabilidad acumulada</option>
            <option value="quantile">Cuantil</option>
        </select>
    </div>

    <div class="form-group">
        <label>Valor x</label>
        <input type="number" id="xValue" value="0">
    </div>

    <button onclick="calculate()">Calcular</button>

    <div id="result"></div>

</section>

<section class="card">
    <canvas id="chart"></canvas>
</section>

<footer>
    © 2026 ProbLab · Creado por Vicente Castellar
</footer>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstat/1.9.4/jstat.min.js"></script>
<script src="script.js" defer></script>
</body>
</html>
