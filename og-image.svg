<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">ProbLab - Calculadoras estadísticas online</title>
  <desc id="desc">Imagen social de ProbLab con una curva de distribución y el texto Calculadoras estadísticas online.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="0.55" stop-color="#4338ca"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="18%" r="58%">
      <stop offset="0" stop-color="#38bdf8" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <g filter="url(#shadow)">
