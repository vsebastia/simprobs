  <path d="M155 405H405M155 185V405" stroke="#94a3b8" stroke-width="1.5"/>
  <path d="M170 393 C220 388 225 345 245 290 C260 247 275 210 290 210 C305 210 320 247 335 290 C355 345 365 388 398 393" fill="none" stroke="#2563eb" stroke-width="8" stroke-linecap="round"/>
  <circle cx="220" cy="360" r="10" fill="#10b981"/>
  <circle cx="340" cy="318" r="10" fill="#7c3aed"/>

  <rect x="530" y="160" width="230" height="92" rx="18" fill="#dbeafe"/>
  <rect x="790" y="160" width="260" height="92" rx="18" fill="#ede9fe"/>
  <rect x="530" y="295" width="230" height="92" rx="18" fill="#d1fae5"/>
