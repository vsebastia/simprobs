<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tamaño muestral: contraste para una media | ProbLab</title>
  <meta name="description" content="Calcula el tamaño muestral para contrastar H0: μ = μ0 (por defecto μ0=0) en una media, con alfa y potencia objetivo.">
  <link rel="canonical" href="https://problabtools.es/tamano-muestral-una-media-contraste.html">
  <link rel="stylesheet" href="style_new.css?v=20260517">
</head>
<body>
<nav class="site-nav" aria-label="Navegación principal"><div class="site-nav-inner"><a class="site-brand" href="index.html">ProbLab</a></div></nav>
<div class="page-wrap">
  <nav class="breadcrumbs" aria-label="Ruta de navegación"><ol><li><a href="index.html">Inicio</a></li><li><a href="tamano-muestral/">Tamaño muestral</a></li><li><span aria-current="page">Contraste para una media</span></li></ol></nav>
  <header class="hero"><p class="eyebrow">Tamaño muestral</p><h1>Contraste para una media (H₀: μ = μ₀)</h1><p class="hero-subtitle">Planifica n para detectar una media distinta de μ₀ (por ejemplo μ₀ = 0) con la potencia deseada.</p></header>
  <main>
    <section class="card sample-size-panel">
      <div class="form-grid sample-grid">
        <div class="inline-inputs">
          <div class="form-group"><label for="mu0">Media nula (μ₀)</label><input id="mu0" type="number" value="0" step="0.1"></div>
          <div class="form-group"><label for="mu1">Media bajo H₁ (μ₁)</label><input id="mu1" type="number" value="2" step="0.1"></div>
        </div>
        <div class="inline-inputs">
          <div class="form-group"><label for="sigma">Desviación estándar esperada (σ)</label><input id="sigma" type="number" value="5" step="0.1" min="0.0001"></div>
          <div class="form-group"><label for="alpha">Alfa (α)</label><input id="alpha" type="number" value="0.05" step="0.001" min="0.0001" max="0.2"></div>
        </div>
        <div class="inline-inputs">
          <div class="form-group"><label for="power">Potencia (1-β)</label><input id="power" type="number" value="0.8" step="0.01" min="0.5" max="0.999"></div>
          <div class="form-group"><label for="tail">Tipo de contraste</label><select id="tail"><option value="two" selected>Bilateral</option><option value="one">Unilateral</option></select></div>
        </div>
      </div>
      <button class="calculate-btn" id="calcBtn">Calcular tamaño muestral</button>
      <div id="result" class="result-box">Resultado pendiente…</div>
    </section>
  </main>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jstat/1.9.4/jstat.min.js"></script>
<script>
function calc(){
  const mu0=parseFloat(mu0El.value), mu1=parseFloat(mu1El.value), sigma=parseFloat(sigmaEl.value), alpha=parseFloat(alphaEl.value), power=parseFloat(powerEl.value), tail=tailEl.value;
  if(!Number.isFinite(sigma)||sigma<=0) throw new Error('σ debe ser mayor que 0.');
  if(!Number.isFinite(alpha)||alpha<=0||alpha>=1) throw new Error('α debe estar entre 0 y 1.');
  if(!Number.isFinite(power)||power<=0||power>=1) throw new Error('La potencia debe estar entre 0 y 1.');
  const delta=Math.abs(mu1-mu0); if(delta<=0) throw new Error('μ1 debe ser distinto de μ0.');
  const zAlpha= tail==='two' ? jStat.normal.inv(1-alpha/2,0,1) : jStat.normal.inv(1-alpha,0,1);
  const zBeta=jStat.normal.inv(power,0,1);
  const n=Math.ceil(Math.pow((zAlpha+zBeta)*sigma/delta,2));
  result.innerHTML=`<strong>Tamaño muestral mínimo:</strong> ${n} observaciones.<br><small>δ = |μ1-μ0| = ${delta.toFixed(4)}; contraste ${tail==='two'?'bilateral':'unilateral'}.</small>`;
}
const mu0El=document.getElementById('mu0'),mu1El=document.getElementById('mu1'),sigmaEl=document.getElementById('sigma'),alphaEl=document.getElementById('alpha'),powerEl=document.getElementById('power'),tailEl=document.getElementById('tail'),result=document.getElementById('result');
document.getElementById('calcBtn').addEventListener('click',()=>{try{calc();}catch(e){result.textContent='Error: '+e.message;}});
</script>
</body></html>
